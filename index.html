<!DOCTYPE html>
<html>

<head>
  <title style="color: #2c3e50;">form element</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <h1 style="text-align: center; color: darkblue;">Student Registration Form</h1>
  <fieldset>
    <br>
    <legend style="color: blue;">Registration Details</legend>
    <br>
    <form autocomplete="on" method="post">
      <label for="name" style="color: Black;">Full name :</label>
      <input id="name" type="text" required="1" placeholder="enter your full name">
      <br>
      <br>
      <label for="pass">email :</label>
      <input id="email" type="email" required="1" placeholder="enter your email">
      <br>
      <br>
      <label for="pass">Password :</label>
      <input id="pass" type="password" required="1" placeholder="enter password">
      <br>
      <br>
      <label for="tel"></label>Number :</label>
      <input id="tel" type="tel" required="1" placeholder="enter your valid number">
      <br>
      <br>
      <label for="Website">Website :</label>
      <input id="Website" type="url" required="1" placeholder="enter your website url">
      <br>
      <br>
      <label for="s">search course :</label>
      <input id="s" type="search" required="1" placeholder="search any thing">
  </fieldset>
  <br>
  <br>
  <fieldset>
    <br>
    <legend style="color: blue;">Personal Details</legend>
    <br>
    <label for="age">Age :</label>
    <input id="age" type="num" placeholder="enter your age">
    <br>
    <br>
    <label for="dae">Date :</label>
    <input id="dae" type="date">
    <br>
    <br>
    <label for="date">Date and Time :</label>
    <input id="date" type="datetime-local">
    <br>
    <br>
    <label for="time">Prefered Time :</label>
    <input id="time" type="time">
    <br>
    <br>
    <label for="ge">Gender :</label>
    <input id="ge" type="radio" name="gender" value="Male">Male
    <input id="ge" type="radio" name="gender" value="Female">Female
    <br>
    <br>
    <label for="ho">Hobbies :</label>
    <input id="ho" type="checkbox" name="Hobbies" value="Reading">Reading
    <input id="ho" type="checkbox" name="Hobbies" value="Writing">Writing
    <input id="ho" type="checkbox" name="Hobbies" value="Dancing">Dancing
    <br>
    <br>
    <label for="co">Color :</label>
    <input id="co" type="color">
    <br>
    <br>
    <label id="s">Skill level :</label>
    <input id="s" type="range">
    <br>
    <br>
  </fieldset>
  <br>
  <br>
  <fieldset>
    <br>
    <legend style="color: blue;">Feedback</legend>
    <br>
    <lable>department</lable>
    <select name="department">
      <option value="ECE">ECE</option>
      <option value="CSD">CSD</option>
      <option value="CSE">CSE</option>
      <option value="EEE">EEE</option>
      <option value="ME">ME</option>>
    </select>
    <br>
    <br>
    <label>Feedback</label>
    <textarea rows="5" cols="50"></textarea>
  </fieldset>
  <br>
  <input type="submit" value="submit">
  <input type="reset" value="cancel">
  </form>
</body>

</html>
